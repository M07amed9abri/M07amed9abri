<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M07amed9abri | عجلة الحظ</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXMcpxwSq-PJdmviG0rVgayPgy8NEnqn0",
            authDomain: "m07amed9abri-auth.firebaseapp.com",
            projectId: "m07amed9abri-auth",
            appId: "1:840232341099:web:061164fada80d4a640ab2e"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                document.getElementById('points-count').innerText = userDoc.exists() ? userDoc.data().points || 0 : 0;
            } else { location.assign('index.html'); }
        });

        window.updatePoints = async (win) => {
            const userRef = doc(db, "users", currentUser.uid);
            await setDoc(userRef, { points: increment(win) }, { merge: true });
            const updated = await getDoc(userRef);
            document.getElementById('points-count').innerText = updated.data().points;
        };
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .wallet { background: #1e293b; padding: 15px; border-radius: 15px; border: 1px solid #f59e0b; margin: 20px auto; max-width: 300px; font-size: 1.2rem; }
        
        /* تصميم العجلة مع الأرقام */
        .wheel-container { position: relative; width: 300px; height: 300px; margin: 40px auto; border-radius: 50%; box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #1e293b; transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1); position: relative; overflow: hidden; background: conic-gradient(#ef4444 0 60deg, #3b82f6 60deg 120deg, #10b981 120deg 180deg, #f59e0b 180deg 240deg, #8b5cf6 240deg 300deg, #ec4899 300deg 360deg); }
        
        /* إضافة الأرقام على العجلة */
        .number { position: absolute; width: 100%; height: 100%; text-align: center; font-weight: bold; font-size: 1.2rem; padding-top: 15px; box-sizing: border-box; }
        .n1 { transform: rotate(30deg); }  /* 0.5 */
        .n2 { transform: rotate(90deg); }  /* 1.0 */
        .n3 { transform: rotate(150deg); } /* 1.5 */
        .n4 { transform: rotate(210deg); } /* 2.0 */
        .n5 { transform: rotate(270deg); } /* 2.5 */
        .n6 { transform: rotate(330deg); } /* 3.0 */

        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid gold; z-index: 10; }
        .btn { padding: 15px 25px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; width: 100%; max-width: 300px; margin-top: 20px; }
        .btn-ads { background: #f59e0b; color: white; }
        .btn-spin { background: #10b981; color: white; display: none; }
    </style>
</head>
<body>
    <h1>🎡 عجلة الحظ</h1>
    <div class="wallet">رصيدك: <span id="points-count">0</span> نقطة</div>
    
    <div class="wheel-container">
        <div class="pointer"></div>
        <div id="wheel">
            <div class="number n1">0.5</div>
            <div class="number n2">1.0</div>
            <div class="number n3">1.5</div>
            <div class="number n4">2.0</div>
            <div class="number n5">2.5</div>
            <div class="number n6">3.0</div>
        </div>
    </div>
    
    <button id="ads-btn" class="btn btn-ads" onclick="watchAd()">🎥 شاهد إعلان للحصول على لفة</button>
    <button id="spin-btn" class="btn btn-spin" onclick="spin()">🔄 لف الآن!</button>
    <p id="msg" style="margin-top:20px; font-weight:bold; min-height: 25px;"></p>
    <a href="index.html" style="color:#94a3b8; text-decoration:none;"><br>⬅ العودة للرئيسية</a>

    <script>
        function watchAd() {
            document.getElementById('msg').innerText = "جاري تحميل الإعلان... انتظر 5 ثوانٍ";
            document.getElementById('ads-btn').disabled = true;
            setTimeout(() => {
                document.getElementById('msg').innerText = "✅ جاهز! اضغط لف الآن.";
                document.getElementById('ads-btn').style.display = 'none';
                document.getElementById('spin-btn').style.display = 'inline-block';
            }, 5000);
        }

        function spin() {
            const wheel = document.getElementById('wheel');
            const randomDeg = Math.floor(Math.random() * 360) + 3600;
            wheel.style.transform = `rotate(${randomDeg}deg)`;
            document.getElementById('spin-btn').disabled = true;

            setTimeout(() => {
                const deg = 360 - (randomDeg % 360);
                let win = 0.5;
                if (deg >= 60 && deg < 120) win = 1.0;
                else if (deg >= 120 && deg < 180) win = 1.5;
                else if (deg >= 180 && deg < 240) win = 2.0;
                else if (deg >= 240 && deg < 300) win = 2.5;
                else if (deg >= 300) win = 3.0;

                window.updatePoints(win);
                document.getElementById('msg').innerHTML = `🎉 مبروك! كسبت <span style="color:#f59e0b">${win}</span> نقطة (${win * 1} جنيه)`;
                document.getElementById('spin-btn').style.display = 'none';
                document.getElementById('ads-btn').style.display = 'inline-block';
                document.getElementById('ads-btn').disabled = false;
                document.getElementById('spin-btn').disabled = false;
            }, 4000);
        }
    </script>
</body>
</html>
