<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M07amed9abri | نظام الأرباح</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXMcpxwSq-PJdmviG0rVgayPgy8NEnqn0",
            authDomain: "m07amed9abri-auth.firebaseapp.com",
            projectId: "m07amed9abri-auth",
            appId: "1:840232341099:web:061164fada80d4a640ab2e"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let userPoints = 0;
        let nextMinWithdraw = 10; // البداية من 10 نقط

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    userPoints = userDoc.data().points || 0;
                    nextMinWithdraw = userDoc.data().nextMin || 10;
                }
                updateUI();
            } else { location.assign('index.html'); }
        });

        window.updatePointsInDB = async (win) => {
            if(!currentUser) return;
            const userRef = doc(db, "users", currentUser.uid);
            await setDoc(userRef, { points: increment(win) }, { merge: true });
            userPoints += win;
            updateUI();
        };

        window.requestWithdraw = async () => {
            const phone = document.getElementById('phone-number').value;
            const wallet = document.getElementById('wallet-type').value;

            if (phone.length < 11) {
                alert("يرجى إدخال رقم هاتف صحيح");
                return;
            }

            if (userPoints < nextMinWithdraw) {
                alert(`عفواً، الحد الأدنى للسحب الحالي هو ${nextMinWithdraw} نقطة`);
                return;
            }

            // تحديث البيانات بعد السحب
            let newMin = nextMinWithdraw + 10;
            if (newMin > 500) newMin = 500;

            const userRef = doc(db, "users", currentUser.uid);
            await updateDoc(userRef, {
                points: increment(-nextMinWithdraw), // خصم النقاط المسحوبة
                nextMin: newMin,
                withdrawRequests: increment(1)
            });

            alert(`تم طلب السحب بنجاح! سيتم تحويل المبلغ لـ ${wallet} رقم ${phone}`);
            location.reload(); // إعادة تحميل لتحديث البيانات
        };

        function updateUI() {
            document.getElementById('points-count').innerText = userPoints;
            document.getElementById('money-count').innerText = (userPoints / 10).toFixed(2);
            document.getElementById('min-withdraw-text').innerText = nextMinWithdraw;
            
            if (userPoints >= nextMinWithdraw) {
                document.getElementById('withdraw-area').style.display = 'block';
            } else {
                document.getElementById('withdraw-area').style.display = 'none';
            }
        }
    </script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; padding: 10px; }
        .wallet-card { background: #1e293b; padding: 20px; border-radius: 15px; border: 2px solid #f59e0b; margin: 15px auto; max-width: 300px; }
        .money { color: #10b981; font-size: 1.5rem; font-weight: bold; }
        .input-box { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 1rem; }
        .btn-withdraw { background: #ef4444; color: white; padding: 15px; width: 100%; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        .wheel-container { margin: 20px auto; width: 250px; height: 250px; }
        /* ستايل العجلة القديم نفسه... */
    </style>
</head>
<body>

    <h1>💰 حصالة الأرباح</h1>
    
    <div class="wallet-card">
        <div>🪙 رصيدك: <span id="points-count">0</span> نقطة</div>
        <div class="money">≈ <span id="money-count">0</span> ج.م</div>
        <div style="font-size: 0.8rem; color: #94a3b8; margin-top: 10px;">
            الحد الأدنى للسحب القادم: <span id="min-withdraw-text">10</span> نقطة
        </div>
    </div>

    <div id="withdraw-area" style="display: none; background: #1e293b; padding: 15px; border-radius: 15px; max-width: 300px; margin: 10px auto;">
        <h3>سحب الأرباح</h3>
        <select id="wallet-type" class="input-box">
            <option value="فودافون كاش">فودافون كاش</option>
            <option value="اتصالات كاش">اتصالات كاش</option>
            <option value="أورنج كاش">أورنج كاش</option>
        </select>
        <input type="tel" id="phone-number" class="input-box" placeholder="رقم المحفظة (01xxxxxxxxx)">
        <button onclick="requestWithdraw()" class="btn-withdraw">إرسال طلب السحب</button>
    </div>

    <hr style="opacity: 0.2; margin: 20px;">
    
    <button id="ads-btn" onclick="openAdAndPrepare()" style="background:#f59e0b; padding:15px; border-radius:10px; border:none; color:white; font-weight:bold; cursor:pointer;">🎥 شاهد إعلان للعب</button>
    <button id="spin-btn" onclick="runWheel()" style="display:none; background:#10b981; padding:15px; border-radius:10px; border:none; color:white; font-weight:bold; cursor:pointer;">🔄 لف العجلة!</button>

    <p id="msg"></p>

    <script src="https://pl29306040.profitablecpmratenetwork.com/9f/e8/4b/9fe84b828ef9b7a97276fa7264809ecf.js"></script>

    <script>
        // هنا تحط دوال runWheel و openAdAndPrepare اللي ظبطناهم قبل كدة
    </script>
</body>
</html>
