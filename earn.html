<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M07amed9abri | تحدي X-O</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXMcpxwSq-PJdmviG0rVgayPgy8NEnqn0",
            authDomain: "m07amed9abri-auth.firebaseapp.com",
            projectId: "m07amed9abri-auth",
            databaseURL: "https://m07amed9abri-auth-default-rtdb.firebaseio.com", // تأكد من تفعيل Realtime Database
            appId: "1:840232341099:web:061164fada80d4a640ab2e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        let currentUser = null;
        let userPoints = 0;
        let currentGameId = null;
        let playerSymbol = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                userPoints = userDoc.exists() ? userDoc.data().points : 0;
                updateUI();
            } else { location.assign('index.html'); }
        });

        // إنشاء أو انضمام لتحدي
        window.findMatch = async () => {
            const bet = 10; // مبلغ الرهان الثابت
            if (userPoints < bet) { alert("رصيدك غير كافٍ للرهان (تحتاج 10 نقاط)"); return; }

            document.getElementById('match-status').innerText = "جاري البحث عن خصم...";
            
            // تحديث الرصيد (خصم الرهان)
            await updateDoc(doc(db, "users", currentUser.uid), { points: increment(-bet) });
            userPoints -= bet;
            updateUI();

            const lobbyRef = ref(rtdb, 'lobby');
            onValue(lobbyRef, (snapshot) => {
                const data = snapshot.val();
                if (!currentGameId) {
                    if (data) {
                        // انضمام لغرفة موجودة
                        const rooms = Object.keys(data);
                        currentGameId = rooms[0];
                        playerSymbol = 'O';
                        update(ref(rtdb, `games/${currentGameId}`), { player2: currentUser.uid, status: 'playing' });
                        remove(ref(rtdb, `lobby/${currentGameId}`));
                        startGame();
                    } else {
                        // إنشاء غرفة جديدة
                        currentGameId = currentUser.uid;
                        playerSymbol = 'X';
                        set(ref(rtdb, `games/${currentGameId}`), {
                            player1: currentUser.uid,
                            board: Array(9).fill(""),
                            turn: currentUser.uid,
                            status: 'waiting',
                            bet: bet
                        });
                        set(ref(rtdb, `lobby/${currentGameId}`), true);
                        document.getElementById('match-status').innerText = "في انتظار دخول خصم...";
                        startGame();
                    }
                }
            }, { onlyOnce: true });
        };

        function startGame() {
            const gameRef = ref(rtdb, `games/${currentGameId}`);
            onValue(gameRef, (snapshot) => {
                const game = snapshot.val();
                if (!game) return;
                renderBoard(game.board);
                if (game.status === 'playing') {
                    document.getElementById('match-status').innerText = game.turn === currentUser.uid ? "دورك الآن!" : "دور الخصم...";
                }
                if (game.winner) {
                    handleEndGame(game.winner);
                }
            });
        }

        window.makeMove = (index) => {
            const gameRef = ref(rtdb, `games/${currentGameId}`);
            onValue(gameRef, (snapshot) => {
                const game = snapshot.val();
                if (game.turn === currentUser.uid && game.board[index] === "" && game.status === 'playing') {
                    const newBoard = [...game.board];
                    newBoard[index] = playerSymbol;
                    const nextTurn = game.player1 === currentUser.uid ? game.player2 : game.player1;
                    
                    const winner = checkWinner(newBoard);
                    update(ref(rtdb, `games/${currentGameId}`), {
                        board: newBoard,
                        turn: nextTurn,
                        winner: winner || (newBoard.includes("") ? null : 'draw')
                    });
                }
            }, { onlyOnce: true });
        };

        async function handleEndGame(winner) {
            if (winner === 'draw') {
                alert("تعادل! تم رد نصف الرهان.");
                await updateDoc(doc(db, "users", currentUser.uid), { points: increment(5) });
            } else if ((winner === 'X' && playerSymbol === 'X') || (winner === 'O' && playerSymbol === 'O')) {
                const prize = 15; // 20 مجموع الرهان - 5 عمولة (25%)
                alert(`مبروك! فزت بـ ${prize} نقطة`);
                await updateDoc(doc(db, "users", currentUser.uid), { points: increment(prize) });
            } else {
                alert("حظ أوفر، لقد خسرت التحدي.");
            }
            location.reload(); // إعادة ضبط الصفحة
        }

        function checkWinner(b) {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let l of lines) { if (b[l[0]] && b[l[0]] === b[l[1]] && b[l[0]] === b[l[2]]) return b[l[0]]; }
            return null;
        }

        function renderBoard(board) {
            const cells = document.querySelectorAll('.cell');
            board.forEach((val, i) => cells[i].innerText = val);
        }

        function updateUI() {
            document.getElementById('points-count').innerText = userPoints.toFixed(1);
            document.getElementById('money-count').innerText = (userPoints / 10).toFixed(2);
        }
    </script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; }
        .header { background: #1e293b; padding: 15px; border-bottom: 2px solid #f59e0b; }
        .wallet-card { background: #1e293b; padding: 15px; border-radius: 15px; border: 2px solid #10b981; margin: 10px auto; max-width: 280px; }
        .board { display: grid; grid-template-columns: repeat(3, 80px); grid-gap: 10px; justify-content: center; margin: 20px auto; }
        .cell { width: 80px; height: 80px; background: #1e293b; border: 2px solid #334155; border-radius: 10px; font-size: 2rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-match { padding: 15px 30px; background: #f59e0b; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #match-status { color: #f59e0b; margin: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; color:#f59e0b;">M07amed9abri | تحدي X-O</h2>
    </div>

    <div class="wallet-card">
        <div>🪙 رصيدك: <span id="points-count">0</span> نقطة</div>
        <div style="color:#10b981; font-weight:bold;">≈ <span id="money-count">0</span> ج.م</div>
    </div>

    <div id="setup-area">
        <p>رهان التحدي: 10 نقاط</p>
        <button class="btn-match" onclick="findMatch()">البحث عن تحدي 🎮</button>
    </div>

    <div id="match-status">اضغط لبدء التحدي</div>

    <div class="board">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>

    <script src="https://pl29306040.profitablecpmratenetwork.com/9f/e8/4b/9fe84b828ef9b7a97276fa7264809ecf.js"></script>
    <script>
        // السمارت لينك بيفتح عند أي محاولة لبدء جيم لزيادة الأرباح
        function openAdBeforeGame() {
            window.open('https://www.profitablecpmratenetwork.com/u5q9f3187?key=113ec9ff04cdb2a2e84cd1106f15041f', '_blank');
        }
    </script>
</body>
</html>
