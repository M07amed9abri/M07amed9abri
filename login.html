<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول | M07amed9abri</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXMcpxwSq-PJdmviG0rVgayPgy8NEnqn0",
            authDomain: "m07amed9abri-auth.firebaseapp.com",
            projectId: "m07amed9abri-auth",
            appId: "1:840232341099:web:061164fada80d4a640ab2e"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.handleLogin = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            try {
                await signInWithEmailAndPassword(auth, email, password);
                msg.style.color = "#10b981";
                msg.innerText = "تم تسجيل الدخول بنجاح! جاري تحويلك...";
                setTimeout(() => { window.location.href = "index.html"; }, 2000);
            } catch (error) {
                msg.style.color = "#ef4444";
                msg.innerText = "خطأ: الإيميل أو كلمة السر غلط";
            }
        };
    </script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .auth-card { background: #1e293b; padding: 30px; border-radius: 15px; width: 100%; max-width: 350px; border: 1px solid #334155; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #3b82f6; border: none; border-radius: 8px; color: white; cursor: pointer; }
        #message { text-align: center; margin-top: 15px; }
        .links { text-align: center; margin-top: 15px; font-size: 0.8rem; }
        .links a { color: #3b82f6; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 style="text-align:center">تسجيل دخول</h2>
        <form onsubmit="handleLogin(event)">
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <input type="password" id="password" placeholder="كلمة السر" required>
            <button type="submit" class="btn">دخول</button>
        </form>
        <div id="message"></div>
        <div class="links">
            <a href="forgot-password.html">نسيت كلمة السر؟</a> | <a href="register.html">إنشاء حساب</a>
        </div>
    </div>
</body>
</html>
