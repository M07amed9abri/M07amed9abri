<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>استعادة كلمة السر | M07amed9abri</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXMcpxwSq-PJdmviG0rVgayPgy8NEnqn0",
            authDomain: "m07amed9abri-auth.firebaseapp.com",
            projectId: "m07amed9abri-auth",
            appId: "1:840232341099:web:061164fada80d4a640ab2e"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.handleReset = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const msg = document.getElementById('message');
            try {
                await sendPasswordResetEmail(auth, email);
                msg.style.color = "#10b981";
                msg.innerText = "تم إرسال رابط إعادة تعيين كلمة السر إلى بريدك الإلكتروني.";
            } catch (error) {
                msg.style.color = "#ef4444";
                msg.innerText = "خطأ: تأكد من كتابة البريد الإلكتروني بشكل صحيح.";
            }
        };
    </script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .auth-card { background: #1e293b; padding: 30px; border-radius: 15px; width: 100%; max-width: 350px; border: 1px solid #334155; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #3b82f6; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }
        #message { text-align: center; margin-top: 15px; font-size: 0.9rem; }
        .back-link { text-align: center; margin-top: 15px; }
        .back-link a { color: #3b82f6; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 style="text-align:center">استعادة الحساب</h2>
        <p style="text-align:center; font-size: 0.8rem; color: #94a3b8;">أدخل بريدك الإلكتروني وسنرسل لك رابطاً لتغيير كلمة السر.</p>
        <form onsubmit="handleReset(event)">
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <button type="submit" class="btn">إرسال الرابط</button>
        </form>
        <div id="message"></div>
        <div class="back-link">
            <a href="login.html">العودة لتسجيل الدخول</a>
        </div>
    </div>
</body>
</html>
