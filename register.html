<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل حساب جديد | M07amed9abri</title>
    <script type="module">
        // استيراد مكتبات Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // بياناتك الخاصة اللي في الصورة
        const firebaseConfig = {
            apiKey: "AIzaSyCXMcpxwSq-PJdmviG0rVgayPgy8NEnqn0",
            authDomain: "m07amed9abri-auth.firebaseapp.com",
            projectId: "m07amed9abri-auth",
            storageBucket: "m07amed9abri-auth.firebasestorage.app",
            messagingSenderId: "840232341099",
            appId: "1:840232341099:web:061164fada80d4a640ab2e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // دالة التسجيل
        window.handleRegister = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await sendEmailVerification(userCredential.user);
                msg.style.color = "#10b981";
                msg.innerText = "تم التسجيل بنجاح! راجع بريدك الإلكتروني لتفعيل الحساب.";
            } catch (error) {
                msg.style.color = "#ef4444";
                msg.innerText = "خطأ: " + error.message;
            }
        };
    </script>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; border: 1px solid #334155; }
        h2 { text-align: center; color: var(--primary); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }
        #message { text-align: center; margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>حساب جديد</h2>
        <form onsubmit="handleRegister(event)">
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <input type="password" id="password" placeholder="كلمة السر" required>
            <button type="submit" class="btn">إنشاء حساب</button>
        </form>
        <div id="message"></div>
    </div>
</body>
</html>
