<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M07amed Sabri | الصفحة الرئيسية</title>
    <style>
        /* تنسيقات عامة للموقع */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0f172a; /* لون خلفية غامق واحترافي */
            color: white;
            text-align: center;
        }

        /* شريط التنقل الجديد (Navigation Bar) */
        nav {
            background-color: #1e293b;
            padding: 20px;
            border-bottom: 2px solid #3b82f6;
            display: flex;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn {
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-login {
            background-color: #3b82f6;
            color: white;
        }

        .btn-register {
            background-color: #10b981;
            color: white;
        }

        .btn:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        /* محتوى الصفحة الرئيسي */
        .content {
            padding: 50px 20px;
        }

        h1 {
            color: #3b82f6;
            font-size: 2.5rem;
        }

        p {
            color: #94a3b8;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <!-- شريط الأزرار الجديد -->
    <nav>
        <a href="login.html" class="btn btn-login">تسجيل الدخول</a>
        <a href="register.html" class="btn btn-register">إنشاء حساب جديد</a>
    </nav>

    <!-- محتوى موقعك -->
    <div class="content">
        <h1>أهلاً بك في موقع محمد صبري</h1>
        <p>هذا الموقع الآن يدعم نظام تسجيل المستخدمين عبر Firebase.</p>
        <hr style="width: 50%; border: 0.5px solid #334155; margin: 30px auto;">
        
        <!-- هنا تقدر تكمل باقي كود موقعك القديم -->
        <div id="old-content">
            <!-- مساحة مخصصة لأي محتوى إضافي تحب تظهره -->
        </div>
    </div>

</body>
</html>
