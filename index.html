<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M07amed9abri | لوحة التحكم</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXMcpxwSq-PJdmviG0rVgayPgy8NEnqn0",
            authDomain: "m07amed9abri-auth.firebaseapp.com",
            projectId: "m07amed9abri-auth",
            appId: "1:840232341099:web:061164fada80d4a640ab2e"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            const guestBox = document.getElementById('guest-box');
            const verifyBox = document.getElementById('verify-box');
            const memberContent = document.getElementById('member-content');

            if (user) {
                if (user.emailVerified) {
                    memberContent.style.display = 'block';
                    guestBox.style.display = 'none';
                    verifyBox.style.display = 'none';
                    document.body.style.alignItems = 'flex-start';
                } else {
                    verifyBox.style.display = 'block';
                    guestBox.style.display = 'none';
                    memberContent.style.display = 'none';
                }
            } else {
                guestBox.style.display = 'flex';
                memberContent.style.display = 'none';
                verifyBox.style.display = 'none';
                document.body.style.alignItems = 'center';
            }
        });

        window.logout = () => { signOut(auth).then(() => location.reload()); };
    </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; display: flex; justify-content: center; min-height: 100vh; transition: 0.3s; }
        
        /* شاشات الدخول والتحقق */
        .auth-card { background: #1e293b; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #3b82f6; width: 90%; max-width: 400px; margin-top: 50px; }
        
        /* تصميم المحتوى الرئيسي */
        #member-content { width: 100%; display: none; }
        .main-header { background: #1e293b; padding: 15px 5%; border-bottom: 2px solid #3b82f6; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px 5%; }
        
        /* تصميم الكروت */
        .card { background: #1e293b; padding: 25px; border-radius: 15px; border: 1px solid #334155; transition: 0.3s; text-align: center; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-10px); border-color: #3b82f6; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2); }
        
        .card h3 { margin-top: 0; color: #3b82f6; }
        .card p { color: #94a3b8; font-size: 0.9rem; }
        
        /* أيقونة مميزة لكل كارت */
        .icon { font-size: 40px; margin-bottom: 15px; display: block; }
        
        .btn { padding: 10px 20px; text-decoration: none; border-radius: 8px; font-weight: bold; display: inline-block; border: none; cursor: pointer; transition: 0.3s; }
        .btn-blue { background: #3b82f6; color: white; }
        .btn-green { background: #10b981; color: white; width: 80%; margin-top: 10px; }
        .btn-gold { background: #f59e0b; color: white; width: 80%; margin-top: 10px; }
        .btn-red { background: #ef4444; color: white; }

        .badge { background: #3b82f6; color: white; font-size: 0.7rem; padding: 3px 8px; border-radius: 5px; position: absolute; top: 10px; left: 10px; }
    </style>
</head>
