<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M07amed9abri | لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, reload } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXMcpxwSq-PJdmviG0rVgayPgy8NEnqn0",
            authDomain: "m07amed9abri-auth.firebaseapp.com",
            projectId: "m07amed9abri-auth",
            appId: "1:840232341099:web:061164fada80d4a640ab2e"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, async (user) => {
            const guestBox = document.getElementById('guest-box');
            const verifyBox = document.getElementById('verify-box');
            const memberContent = document.getElementById('member-content');
            const userNameDisplay = document.getElementById('user-name-display');

            if (user) {
                await reload(user); 
                if (user.emailVerified) {
                    memberContent.style.display = 'block';
                    guestBox.style.display = 'none';
                    verifyBox.style.display = 'none';
                    // عرض اسم المستخدم (الجزء قبل @ في الإيميل)
                    userNameDisplay.innerText = user.displayName || user.email.split('@')[0];
                } else {
                    verifyBox.style.display = 'block';
                    guestBox.style.display = 'none';
                    memberContent.style.display = 'none';
                }
            } else {
                guestBox.style.display = 'block';
                memberContent.style.display = 'none';
                verifyBox.style.display = 'none';
            }
        });

        // وظيفة إظهار/إخفاء قائمة الترس
        window.toggleSettingsMenu = () => {
            const menu = document.getElementById('settings-dropdown');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        };

        // إغلاق القائمة عند الضغط في أي مكان خارجها
        window.onclick = (event) => {
            if (!event.target.matches('.fa-gear')) {
                const dropdowns = document.getElementsByClassName("dropdown-content");
                for (let i = 0; i < dropdowns.length; i++) {
                    dropdowns[i].style.display = "none";
                }
            }
        };

        window.logout = () => { signOut(auth).then(() => location.assign('index.html')); };
    </script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; min-height: 100vh; }
        
        /* الـ Header مع الترس */
        .main-header { background: #1e293b; padding: 10px 5%; border-bottom: 2px solid #3b82f6; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        
        .header-left { display: flex; align-items: center; gap: 20px; }
        
        .settings-container { position: relative; display: inline-block; }
        .fa-gear { font-size: 1.5rem; color: #94a3b8; cursor: pointer; transition: 0.3s; }
        .fa-gear:hover { color: #3b82f6; transform: rotate(90deg); }

        /* القائمة المنسدلة */
        .dropdown-content {
            display: none;
            position: absolute;
            left: 0;
            top: 40px;
            background-color: #1e293b;
            min-width: 200px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            z-index: 1;
            border-radius: 12px;
            border: 1px solid #334155;
            text-align: right;
            padding: 10px 0;
        }

        .user-info-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #334155;
            text-decoration: none;
            color: white;
            transition: 0.2s;
        }
        .user-info-item:hover { background-color: #334155; }

        .profile-img { width: 35px; height: 35px; background: #3b82f6; border-radius: 50%; margin-left: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        /* باقي ستايل الكروت */
        .auth-card { background: #1e293b; padding: 40px; border-radius: 20px; border: 1px solid #3b82f6; width: 90%; max-width: 400px; margin: 100px auto; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 40px 5%; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; border: 1px solid #334155; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: #3b82f6; }
        .btn { padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; text-decoration: none; display: inline-block; }
        .btn-red { background: #ef4444; color: white; }
        .btn-blue { background: #3b82f6; color: white; width: 100%; }
        .btn-green { background: #10b981; color: white; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="guest-box" class="auth-card" style="display: none;">
        <h1>M07amed9abri</h1>
        <a href="login.html" class="btn btn-blue">تسجيل الدخول</a>
        <a href="register.html" class="btn btn-green">إنشاء حساب جديد</a>
    </div>

    <div id="verify-box" class="auth-card" style="display: none;">
        <h2 style="color: #f59e0b;">تفعيل الحساب</h2>
        <button onclick="location.reload()" class="btn btn-blue">تحديث الحالة</button>
    </div>

    <div id="member-content">
        <header class="main-header">
            <span style="font-size: 1.6rem; font-weight: bold; color: #3b82f6;">M07amed9abri</span>
            
            <div class="header-left">
                <div class="settings-container">
                    <i class="fa-solid fa-gear" onclick="toggleSettingsMenu()"></i>
                    <div id="settings-dropdown" class="dropdown-content">
                        <a href="settings.html" class="user-info-item">
                            <div class="profile-img"><i class="fa-solid fa-user"></i></div>
                            <span id="user-name-display">تحميل...</span>
                        </a>
                        <a href="settings.html" class="user-info-item" style="font-size: 0.9rem; color: #94a3b8;">
                            <i class="fa-solid fa-sliders" style="margin-left: 10px;"></i> الإعدادات
                        </a>
                    </div>
                </div>
                <button onclick="logout()" class="btn btn-red">خروج</button>
            </div>
        </header>

        <div class="grid-container">
            <div class="card"><h3>ألعاب الربح</h3><p>جمع النقاط والجوائز.</p><a href="#" class="btn btn-blue">ابدأ</a></div>
            <div class="card"><h3>دردشة الأصدقاء</h3><p>تواصل مع الجميع.</p><a href="#" class="btn btn-blue">دخول</a></div>
            <div class="card"><h3>قصص وحكايات</h3><p>أروع الروايات.</p><a href="#" class="btn btn-blue">قراءة</a></div>
            <div class="card"><h3>ألعاب التسلية</h3><p>وقت ممتع.</p><a href="#" class="btn btn-blue">العب</a></div>
        </div>
    </div>

</body>
</html>
