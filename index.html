<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M07amed9abri | الرئيسية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, reload } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXMcpxwSq-PJdmviG0rVgayPgy8NEnqn0",
            authDomain: "m07amed9abri-auth.firebaseapp.com",
            projectId: "m07amed9abri-auth",
            appId: "1:840232341099:web:061164fada80d4a640ab2e"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, async (user) => {
            const guestBox = document.getElementById('guest-box');
            const verifyBox = document.getElementById('verify-box');
            const memberContent = document.getElementById('member-content');
            const userNameDisplay = document.getElementById('user-name-display');

            if (user) {
                await reload(user); 
                if (user.emailVerified) {
                    memberContent.style.display = 'block';
                    guestBox.style.display = 'none';
                    verifyBox.style.display = 'none';
                    userNameDisplay.innerText = user.displayName || user.email.split('@')[0];
                } else {
                    verifyBox.style.display = 'block';
                    guestBox.style.display = 'none';
                    memberContent.style.display = 'none';
                }
            } else {
                guestBox.style.display = 'block';
                memberContent.style.display = 'none';
                verifyBox.style.display = 'none';
            }
        });

        window.toggleSettingsMenu = () => {
            const menu = document.getElementById('settings-dropdown');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        };

        window.logout = () => { signOut(auth).then(() => location.reload()); };
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; margin: 0; text-align: center; }
        .main-header { background: #1e293b; padding: 15px 5%; border-bottom: 2px solid #3b82f6; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .fa-gear { font-size: 1.4rem; color: #94a3b8; cursor: pointer; transition: 0.3s; }
        .fa-gear:hover { transform: rotate(90deg); color: #3b82f6; }
        .dropdown-content { display: none; position: absolute; left: 0; top: 45px; background: #1e293b; min-width: 180px; border-radius: 12px; border: 1px solid #334155; text-align: right; overflow: hidden; z-index: 200; }
        .user-info-item { display: flex; align-items: center; padding: 12px; text-decoration: none; color: white; border-bottom: 1px solid #334155; }
        .user-info-item:hover { background: #334155; }
        .profile-img-circle { width: 30px; height: 30px; background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-left: 10px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 40px 5%; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; border: 1px solid #334155; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: #3b82f6; }
        .icon { font-size: 40px; margin-bottom: 10px; display: block; }
        .btn { padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; text-decoration: none; display: inline-block; width: 80%; }
        .btn-gold { background: #f59e0b; color: white; }
        .btn-blue { background: #3b82f6; color: white; }
        .btn-purple { background: #8b5cf6; color: white; }
        .btn-green { background: #10b981; color: white; }
        .btn-red { background: #ef4444; color: white; width: auto; }
        .auth-card { background: #1e293b; padding: 40px; border-radius: 20px; border: 1px solid #3b82f6; width: 90%; max-width: 400px; margin: 100px auto; }
    </style>
</head>
<body>
    <div id="guest-box" class="auth-card" style="display: none;">
        <h1>M07amed9abri</h1>
        <a href="login.html" class="btn btn-blue" style="margin-bottom: 10px;">تسجيل الدخول</a>
        <a href="register.html" class="btn btn-green">حساب جديد</a>
    </div>

    <div id="verify-box" class="auth-card" style="display: none;">
        <h2>تفعيل الحساب</h2>
        <button onclick="location.reload()" class="btn btn-blue">تحديث</button>
    </div>

    <div id="member-content" style="display: none;">
        <header class="main-header">
            <span style="font-size: 1.5rem; font-weight: bold; color: #3b82f6;">M07amed9abri</span>
            <div class="header-left">
                <div style="position: relative;">
                    <i class="fa-solid fa-gear" onclick="toggleSettingsMenu()"></i>
                    <div id="settings-dropdown" class="dropdown-content">
                        <a href="settings.html" class="user-info-item">
                            <div class="profile-img-circle"><i class="fa-solid fa-user"></i></div>
                            <span id="user-name-display">...</span>
                        </a>
                        <a href="settings.html" class="user-info-item"><i class="fa-solid fa-sliders" style="margin-left:10px"></i>الإعدادات</a>
                    </div>
                </div>
                <button onclick="logout()" class="btn btn-red">خروج</button>
            </div>
        </header>

        <div class="grid-container">
            <div class="card" style="border-color: #f59e0b;">
                <span class="icon">🪙</span>
                <h3>ألعاب الربح</h3>
                <p>شاهد الإعلانات واكسب نقاطك.</p>
                <a href="earn.html" class="btn btn-gold">العب الآن</a>
            </div>
            <div class="card">
                <span class="icon">👥</span>
                <h3>دردشة الأصدقاء</h3>
                <p>تواصل مع الجميع.</p>
                <a href="#" class="btn btn-purple">دخول</a>
            </div>
            <div class="card">
                <span class="icon">📖</span>
                <h3>قصص وحكايات</h3>
                <p>أروع القصص والروايات.</p>
                <a href="#" class="btn btn-blue">قراءة</a>
            </div>
            <div class="card">
                <span class="icon">🎮</span>
                <h3>ألعاب التسلية</h3>
                <p>وقت ممتع وألعاب خفيفة.</p>
                <a href="#" class="btn btn-green">العب</a>
            </div>
        </div>
    </div>
</body>
</html>
