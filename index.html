<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M07amed9abri | لوحة التحكم</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, reload } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // تأكد أن هذه البيانات مطابقة تماماً لما في Firebase Console
        const firebaseConfig = {
            apiKey: "AIzaSyCXMcpxwSq-PJdmviG0rVgayPgy8NEnqn0",
            authDomain: "m07amed9abri-auth.firebaseapp.com",
            projectId: "m07amed9abri-auth",
            appId: "1:840232341099:web:061164fada80d4a640ab2e"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, async (user) => {
            const guestBox = document.getElementById('guest-box');
            const verifyBox = document.getElementById('verify-box');
            const memberContent = document.getElementById('member-content');

            if (user) {
                // تحديث بيانات المستخدم إجبارياً للتأكد من حالة التفعيل
                await reload(user); 
                
                if (user.emailVerified) {
                    memberContent.style.display = 'block';
                    guestBox.style.display = 'none';
                    verifyBox.style.display = 'none';
                } else {
                    verifyBox.style.display = 'block';
                    guestBox.style.display = 'none';
                    memberContent.style.display = 'none';
                }
            } else {
                guestBox.style.display = 'block';
                memberContent.style.display = 'none';
                verifyBox.style.display = 'none';
            }
        });

        window.logout = () => { signOut(auth).then(() => location.assign('index.html')); };
    </script>

        #member-content { width: 100%; display: none; }
        .main-header { background: #1e293b; padding: 15px 5%; border-bottom: 2px solid #3b82f6; display: flex; justify-content: space-between; align-items: center; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px 5%; }
        .card { background: #1e293b; padding: 25px; border-radius: 15px; border: 1px solid #334155; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: #3b82f6; }
        .icon { font-size: 40px; margin-bottom: 15px; display: block; }
        .btn { padding: 10px 20px; text-decoration: none; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; display: inline-block; }
        .btn-blue { background: #3b82f6; color: white; }
        .btn-green { background: #10b981; color: white; width: 100%; margin-top: 10px; }
        .btn-gold { background: #f59e0b; color: white; width: 100%; margin-top: 10px; }
        .btn-red { background: #ef4444; color: white; }
    </style>
</head>
